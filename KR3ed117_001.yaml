body:
  text: 卷上濟顛祖師乩傳仙果散此散功能去積消痰通經行氣取效神速且便攜帶居家作客均宜預備經久不壞愈陳愈妙誠濟世之靈散救病之至寶也一泄瀉每次嚼數分咽汁吐渣二三錢即愈一紅白痢日嚼二三錢一二日即愈一諸瘧日嚼二三錢連嚼二三日瘧止為度一胃停食積舌胎必黃厚日嚼二錢嚼一二三日積消胃開為度一胃氣疼痛甚至每晨嘔吐者用五六錢水煎濃汁熱服即愈一霍亂吐瀉用四五錢水煎服即愈一風火喉痛喉蛾嚼二三錢即愈一痰嗽日嚼二錢連嚼數日至愈為度薑湯送服亦可一中風不語每日早晚各服一錢生薑湯送下至愈為度一飯後動風旋由胸腹脹起延脹四肢名曰氣脹日嚼二三錢連嚼數日俟脹消盡為度不必忌咸一小便短少旋由兩足背脹起漸至上身名曰水脹治法同上一婦女經閉肚脹手足細瘦俗名蜘蛛脹日嚼二三錢漸嚼漸效總以脹消盡為度自然眠食如常數月之後血氣充足經水自通一婦女經閉日嚼二錢至經通為度或因血衰經閉忌服一婦女經水不調氣鬱不舒日嚼一二錢數日即愈一婦女臨經腹痛俟經來痛時日嚼二錢連嚼二三日俟下期見效一酒醉人昏用三四錢水煎濃汁熱服即醒統須忌食生冷瓜果香菇蘑菇冬筍酒糟蝦蟹油炸麵食芋艿發氣等物虛症忌服孕婦不忌青果一百斤青鹽白鹽各四斤陳皮三十兩木香青皮砂仁各一十兩丁香藿香蘇葉各五兩大茴小茴薄荷各三兩花椒一兩上藥各先將青白鹽搗極細分五份余藥共研為末青果亦分五份分次放於木腳盆內加二鹽一份兩手拌之儲瓷缸內余份仿此次日取出青果用小石臼舂按粒舂開去核完竣缸底有汁就用細夏布濾去泥土就將藥末放入缸內使汁收盡再與青果肉拌勻分次放大石臼內舂成細碎攤曬三五日半乾為度切勿太燥儲潔淨壇內築實封口收藏一二年後隨時聽用效難盡述敬祈仁人君子如法配製以備救濟疾苦功無涯量福有攸歸仙傳三妙膏陰陽症並治統治癰疽發背對口疔瘡無名腫毒濕痰流注楊梅結毒瘰癧馬刀婦人乳疽小兒丹毒湯火燒灼蠍螫蜂叮金刃所傷出血不止或被狗咬腐痛不堪或跌撲打傷瘀痛難禁或風寒濕氣襲入經絡以致骨痛筋攣或濕熱橫入脈絡閃腰挫氣動舉難伸並大人小兒五積六聚男婦痞塊癥瘕並宜用之又有瘡癰日久內生腐骨口極細小時流黃水諸法不效此膏逐日貼之其骨自然漸漸出露以手輕輕拔去骨盡收功此膏貼癰疽等症未成即消已成即潰潰後即斂故名三妙紫荊皮石菖蒲獨活赤芍白芷各二兩千金子川大黃川黃連川黃柏片黃芩全當歸天花粉穿山甲白附子海風藤金銀花大戟鱉甲牛膝白芨牛蒡子桃仁紅花荊芥半夏黃耆牙皂草烏蓖麻血餘連翹殼細辛防風苦參殭蠶蝟皮巴豆上瑤桂良薑蘇木羌活麻黃烏藥柴胡天麻全蠍白蘞生甘草防己貝母各五錢蜈蚣五條蛇蛻二條上藥統切片用麻油二百兩入大銅鍋內浸七日夜再入桃柳桑槐枝各二十一段每段長寸許如手指粗以慢火熬至藥黑枯色用細夏布濾去渣將鍋拭淨仍以夏布濾入鍋內再用文武火熬至油滴水成珠大約得淨油一百六十兩為準離火入燥飛黃丹八十兩以一人持槐木棍一人下丹不住手攪勻再入後藥乳香沒藥各去油八錢血竭雄黃各五錢此四味各研細末和勻再研先入攪勻再入後藥真云麝沉香檀香降香木香楓香藿香丁香各五錢珍珠冰片各三錢此十味各研極細末和勻再研徐徐添入攪極勻再入樟腦五錢再攪勻成膏收藏聽用效莫殫述也雲臺膏藥味純涼專治陽症統治發背對口搭手頸癧乳癰肚癰腰癰爛腿臁瘡等症初起消腫已成潰膿既潰斂口潰後雖孔小如豆不必拈藥線入管而膿自出有腐肉者亦自然劃離消化無須鉗割有骨者亦能推出不假刀針升降爛藥始終只用此膏極為簡便神速且能減痛可以眠食與外科治法不同症愈重則愈見力量雖久潰無不收口又如狗咬者貼之則爛爛而仍自收口並無妨礙至敷藥糝藥乃與此膏相輔而行不可缺也生大黃五兩木鱉仁三兩元參生地黃忍冬藤土貝母生甘草薄荷朴硝各二兩生黃耆全當歸各一兩五錢苦杏仁赤芍川芎生草烏生半夏生南星白芷生黃柏生山甲露蜂房殭蠶蜈蚣全蠍蛇蛻漂銅綠蓖麻仁制乳香蟬蛻銀硃生礬枯礬制沒藥明雄黃牡蠣粉蟾皮輕粉川五倍各一兩丁香五錢發團二兩上藥用小磨麻油八斤入銅鍋內熬至藥黑枯色用細夏布濾去渣將鍋拭淨仍以夏布濾入鍋內文火熬至油滴水成珠離火再入炒黃丹四十八兩用槐木棍攪勻再入後藥炒鉛粉一斤松香提白八兩黃蠟陳石灰炒陀僧各四兩蘇合油樟腦各一兩前藥隨下隨攪成膏收儲瓷器聽用再初熬前藥內或加後藥十一味更妙羌活天花粉連翹殼防風香附蒼朮陳皮各一兩黃連細辛紅花瑤桂各五錢萬應膏專治跌打損傷青腫疼痛如皮破出血者忌用又治手足等處瘋痛肝胃氣痛胸腹腰等處膈氣疼痛又治初起癰疽貼之可散如已成作痛者忌之嫩松香一斤黃老者不用蓖麻仁巴豆仁各二兩康青杏仁開水泡去皮各一兩膽礬五錢上藥先將松香用鐵鍋水煎三次取起候乾隔一日研細末再以蓖麻仁巴豆仁各炒黑枯若不黑枯其性太烈不能用康青膽礬各研細末先將杏仁落石臼舂爛如泥次下巴豆蓖麻仁一併舂爛再下康青膽礬緩緩舂之並將松香分數次下隨下隨舂再用麻油屢塗杵臼勿致黏住千捶成膏儲瓷器臨用時須重湯燉烊攤貼患處黃蠟膏專治新舊臁瘡忌食酒糟豬羊雞鵝香菇麻菇冬筍煎炒發氣等物黃蠟八兩穿山甲五倍子血竭各二兩麻油二斤生槐枝生柳枝各四十二寸如手指粗上藥用銅鍋熬成七分濾去渣再加乳香沒藥各一兩赤石脂龍骨五靈脂各六錢兒茶四錢各研細末入鍋再熬至油滴水成珠再加黃丹二兩血餘炭五錢各研細末攪勻候冷加三梅冰五錢和勻裝入瓷罐聽用愈陳愈妙用時將患處腐膿紙拭乾淨切忌水洗油紙攤貼每日早夜各換一次效驗如神豬膽膏專治大小無名腫毒肉白色淡陰疽忌用每年夏至後用粗缽一個逐日赴市討取豬膽不拘多寡攜回破膽皮放汁於缽隨放隨攪勻隨曬夜間及遇雨則用蓋蓋之放曬至三伏後為止封口收藏隨時用油紙攤貼效驗如神第一靈寶丹此丹能卻百病通利關竅取效神速居家出門常宜預備誠救急之靈丹濟世之良藥也一受暑肚痛或感寒鼻塞頭疼腹痛用丹少許搐鼻一二次取嚏十餘聲即愈如病稍重搐鼻無嚏或只一二聲病尚未除或抹兩眼尖角或用溫開水調服一分以愈為度一感受暑氣或受熱太過關竅不通或受寒氣手足厥冷氣閉血滯默睡無語須抹兩眼尖角二次或用陰陽水調服二分以愈為度或至不省人事須服三分方能奏效抑或無論牙關緊閉與否大約半時之久每次取丹少許連抹兩眼尖角三次聽其安睡勿使過熱約逾二三時辰自然起死回生一疫癘時行取丹抹兩眼尖角三次蓋被略睡出汗自愈一指上生瘡用雞蛋一枚開一孔攪勻黃白入丹五釐再攪勻套指上一二枚即愈一初起無名腫毒用真米醋調搽一火眼之症取丹抹眼角一六畜遇時症取丹抹兩眼尖角二三次即愈一常帶身上疫氣不能沾染孕婦忌服搐鼻抹眼角不忌辰砂二兩雄精五錢真蟾酥鬧陽花各一錢真云麝上冰片老薑粉各三分上藥將前四味各研極細末和勻後三味次第加入研至勻細為度裝儲瓷瓶勿令泄氣隨時分裝小瓶黃蠟封口外以刊刷方紙包而傳送功德殊無涯量矣萬應十寶丹此丹乃仙傳秘方丸治百病其效如神遇有疑似未明一時迫切之症可將此丹內服外用無不應手立愈者居家出門均宜製備濟人利己功德莫大誠救急之聖藥濟世之良方也一中寒中暑痧脹吐瀉手足厥冷並吐瀉不出先以三丸研末吹入鼻內再以二十九丸放舌上候微麻嚥下如昏迷不能吞嚥即研細末溫水灌下自愈一感冒風寒噁心頭痛或肚腹飽脹及風痰等症以七丸放舌上微麻嚥下一受寒受暑痧脹甚重絞腸肚痛心口閉悶或不省人事以五丸研細末次入鼻內取嚏再以二十一丸放舌上少頃溫開水送下如不見輕再照前服一緊痰氣厥昏迷不省牙關緊閉不能服藥即以十數丸研細吹入鼻內無嚏再吹總以見嚏方可施治再以念三丸溫水灌服即愈一癰疽疔毒惡瘡頑㾾發背對口用數十丸研細末好紹酒陳米醋調敷再酌輕重服之一蛇蠍蜈蚣諸蟲咬傷俱用數丸研細末用好酒陳米醋調敷內酌輕重服之一小兒急驚風牙關緊閉不能服藥以四五丸研末吹入鼻內取嚏即醒再以七丸溫水灌下即愈若慢驚風萬不可服一臌脹水腫噎嗝反胃以三丸放舌尖上微麻嚥下再服念三丸日服二次十日即愈惟臌脹須忌食鹽醬百日一胃口疼痛氣痛寒痛甚至飲食不下以五丸放舌尖上微麻嚥下再用花椒七粒煎湯送服念一丸即愈一山嵐瘴氣夏月途行空心觸受穢氣口含三丸使邪氣不能侵入每遇盛寒盛暑早晨服七丸可保無恙一吐血衄血便血其勢甚重即用鮮藕自然汁送服念一丸如無鮮藕用干藕節七個煎湯送下一跌打至死驚死熱死魘魅氣悶至死等症凡有微氣以數丸研細吹鼻內再用溫水調灌可望復生如見嚏即活一瘟瘧暑瘧日久不愈之瘧或先熱後冷或先冷後熱無論陰瘧陽瘧於迎瘧來時用松蘿茶清送服念一丸雖至重連服三日即愈一泄瀉紅白痢噤口痢雖日夜幾十次勢甚委頓用開水送下念一丸立止如神一時疫頭痛身痛肚疼頭眩眼黑以九丸放舌尖上閉口微麻嚥下再用溫水送服念一丸即愈一婦女經水不調經閉等症經水不調用當歸生地白芍川芎各一錢煎湯送服念一丸即愈經閉用紅花一錢煎湯送服念九丸連服三次即愈一疝氣上衝於心不能行走者用小茴香七粒研末滾水沖送服三十九丸即愈一小兒悶痘悶疹用薄荷芫荽各一錢煎湯灌送三十丸即愈茅蒼朮米泔水浸軟切片焙乾三兩大黃切片焙乾六兩麻黃去節細銼明天麻切片焙乾明雄黃研細水飛各三兩六錢生甘草去皮炒二兩四錢蟾酥一兩丁香六錢真云麝肥皂莢去筋各三錢上藥各研極細末和勻再研燒酒為丸如粟米粒大外以硃砂三兩六錢研細末水飛曬乾研末為衣以小瓷瓶收儲黃蠟封口切勿泄氣孕婦忌服如意丹治癰疽大毒惡瘡並刀石破傷潰爛功能解膿提毒去腐生肌川五倍焙燥二兩明雄精炙山甲各四錢蜈蚣焙全蠍焙各七隻蟬蛻焙一十四隻真云麝上梅冰各三分上藥各研極細末和勻再研儲瓷瓶勿令出氣臨用時先將腐膿用弱紙拭淨以破散羊毫筆蘸丹糝患處金花散蓋面雲臺膏貼之每日早晚各換一次忌食發氣煎炒酒糟等物其效如神三仙丹專治諸瘡毒腐並拔陳瘡管肉火硝皂礬各三兩水銀一兩五錢前二味先研勻細加水銀研勻攤入小鐵鍋內以大碗蓋之碗口四圍用綿紙條拈捻麵糊封口上覆砂土築實碗足之上再壓重磚以免衝開鍋放爐上用白炭火燒之先文後武點一枝半或二枝竹香為度離火候冷去淨砂土開看碗上黏滿如白粉為上品如秋葵色松花黃次之紅黃色者均可用用小刀刮下研極細儲瓷瓶聽用遇瘡有腐管糝少許以金花散蓋面膏藥貼之次日開看腐管即起鉗拭乾淨如腐管未盡再用已盡不用只糝金花散生肌收功丹底研細末另儲可治癬疥用麻油調擦雖痛無妨終必見效如神萬靈丹專治癲狗毒蛇咬傷並一切中毒疼痛等症修合時須齋戒虔誠明雄精四錢制甘石一錢五分牙硝一錢三分真云麝當門子一錢大梅冰九分飛月石九分廣