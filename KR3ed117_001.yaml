白色淡者是瑤桂心一兩麻黃薑炭各五錢上藥各研細末和勻黃米飯搗爛為丸如綠豆大每日開水送服二錢宜暖睡出汗至愈為度痢瀉丸專治痢疾泄瀉全當歸生白芍各六兩枳殼檳榔萊菔子各二兩車前子生甘草各一兩上藥共研細末水發為丸如萊菔子大每服五錢小兒每服三錢開水送下數服即愈珍珠散治下疳陽物腫痛破爛等症珍珠煅灰枯礬雄精黃柏宮粉煅各等分上藥各研細末和勻再研極細儲瓷瓶用米泔水洗淨患處日糝數次數日即愈琥珀珍珠八寶丹治一切濕瘡煅甘石赤石脂上血竭兒茶各二錢煅龍骨一錢煅珍珠琥珀象皮各五分上藥各研細末和勻再研極細儲瓷瓶聽用鐵扇散象皮切薄片焙黃色以干為度勿令焦龍骨用上白者生研各五錢陳石灰數百年者佳寸柏香即松香中之黑色者松香與寸柏香同熔化攪勻入冷水取起晾乾研為末飛白礬各一兩上藥共研極細末儲瓷瓶遇有一切破傷者用藥敷傷口以扇扇之立愈不必包裹過暖難於結痂並忌飲酒恐致血熱妄行忌臥熱處夏宜涼地冬宜火烘如傷處發腫煎黃連水翎毛蘸塗即消或潰爛日久有膿血者用黃連煎湯洗後敷藥昔有一人因口角用刀自刎傷長二寸余食嗓半斷傷口冒血痛甚在地打滾不能敷藥因縛其手足令臥涼地用枕墊其首使傷口閉合即敷此散扇之少頃血凝半日後能湯飲三日而愈白附散一名玉真散專治跌墜毆壓馬踢刀箭諸傷雖腎子壓出者可治立能止血止痛並不忌風白附子十二兩生南星白芷天麻羌活防風各一兩上藥各研極細末和勻如破傷出血者就糝患上傷重者黃酒浸服二三錢多飲者易麻倒少刻即愈亦無害也如青腫者水調敷之立愈如火傷加蜂蜜冰片調敷湯水傷用麻油調敷甚者加地榆末均速效凡遇鬥毆傷者可全兩命價廉而功大務須預先配合以備不時施醫但此散容易受蒸宜用洋鐵筒裝儲綿紙封口金花散治發背對口肚癰腰癰搭手臁瘡一切紅腫癰毒生石膏一斤煅熟黃丹一兩上藥各研細末和勻再研儲瓶候用生豬板油不拘幾兩扯去皮搗爛將散緩緩加入隨搗隨加以韌為度量患之大小寬攤川油紙約厚半分將患上腐膿弱紙拭淨以此散糝滿患口豬油膏藥蓋之一日兩換功能去腐生新其效如神如症重者酌服降癰活命飲並須忌食酒糟豬羊冬筍香菇蘑菇油炸麵食發氣各物降癰活命飲治一切有名腫毒無論陰陽症初起能益氣和血解毒托裡破後能排膿去腐生肌長肉誠瘡科始終之聖藥大當歸八錢生黃耆金銀花各五錢生甘草三錢患在上部加川芎二錢在中部加桔梗二錢在下部加牛膝二錢如泄瀉加蒼白朮各二錢嘔吐噁心加陳皮半夏各一錢不思飲食加白朮三錢陳皮一錢氣虛加黨參五錢陰疽肉白色淡無論冬夏加陳皮麻黃各六分瑤桂心炮姜各一錢五分切不可妄行加減再如排膿加白芷二錢欲破加皂刺一錢五分已破者不用火氣盛加天花粉黃芩各二錢大便閉結加熟大黃三錢已通者不用上藥用陳紹酒清水各一碗煎濃汁熱服服後宜暖睡出汗銀青散治男子陰頭生瘡腐爛疼癢女人陰戶兩旁生瘡濕爛腫痛發癢並治小兒痘疤腫爛痘後餘毒不清滿頭黃泡瘡等症白螺螄殼取土牆上白色者佳去淨泥火煅二兩橄欖核火煅寒水石各四錢各研極細和勻儲瓷瓶臨用時每取散二錢配牙色梅冰一分上藥共研勻另儲瓷瓶勿令泄氣用麻油調敷患處濕者干糝神效無比青金散治小兒胎毒疳瘡蠟梨頭瘡男婦發癢濕瘡等症嫩松香一斤鐵鍋內熬烊至沸平為度立刻取起切勿過時若遇時性太烈不用倒在紙鋪有凹泥地上候冷取起秤用四兩煅蛤殼青黛各一兩上藥各研細末和勻再研儲瓷瓶用真麻油調敷患處每日一換切忌水洗並須忌食發氣諸物數日即愈松香散治小兒胎毒蠟梨頭瘡並男婦一切濕瘡老松香炒枯礬各二兩黃丹微炒青黛各一兩鉛粉炒淨勿留鉛氣五錢上藥各研細末和勻再研儲瓷瓶濕則干糝干則麻油調搽每日一換切忌水洗忌食發氣諸物有人施送數十年神效無比紫袍散治咽喉十八症石青青黛硃砂白硼砂各一兩人中白煅冰片膽礬元明粉山豆根各三分上藥共研細末瓷瓶收儲封密臨用時取二三釐吹咽喉即愈萬應吹喉散治喉癰喉痹喉痧纏喉風雙單乳蛾陰虛咽喉等症上犀黃一錢滴乳石兒茶各五錢黃連川鬱金各四錢上血竭青黛真硼砂生甘草各三錢燈草灰白芷黃柏薄荷各二錢大梅冰珍珠辰砂各一錢上藥各研細末按件稱准和勻再研極細瓷瓶收藏勿令泄氣遇症連吹數次其效如神忌食發氣諸物一百二十日消痔千金散兒茶黃連寒水石各五分硼砂赤石脂煅甘石各三分熊膽二分上梅冰一分上藥各研細末和勻再研儲瓷瓶清茶調敷患上腫痛立止又外痔用紅棗去核入銅青線扎炭火上煅存性研細末痔濕干糝干則以津潤濕擦之一笑散治風火牙痛雄黃精四錢生石膏硃砂馬牙硝各二錢大梅冰五分上藥各研細末和勻再研儲瓷瓶搐鼻擦牙各少許數次即愈光明散治時眼紅腫疼痛多眵流淚羞明上甘石煅淬法同上一兩飛硃砂飛月石各五錢真云麝上梅冰各八分上藥各研細末和勻再研極細儲瓷瓶封口勿令泄氣令病人仰臥以牙籤沾藥點大小眥內眼閉一飯時撥出藥屑日點三四次臨臥點一次極效內服後方涼血散火湯生地二錢當歸尾赤芍條芩牡丹皮各一錢五分柴胡車前子荊芥防風各一錢蟬蛻八分如頭痛惡風發熱加羌活一錢眼痛不可忍並口渴加酒炒川連一錢如腫不消紅不退者加紅花六分上藥水煎食後服每日一劑病退為度當歸湯治跌打損傷未破口者功能散瘀活血雖已氣絕牙關緊閉照白糖飲治法擦開灌之亦活此少林寺教師方也當歸澤瀉各五錢川芎紅花桃仁丹皮各三錢好蘇木二錢如頭傷加藁本一錢手傷加桂枝一錢腰傷加杜仲一錢脅傷加白芥子一錢膝傷加牛膝一錢上藥用紹酒清水各一碗煎六分熱服白糖飲凡跌打損傷如已氣絕牙關緊閉先用半夏在兩腮邊擦之牙關自開急用熱紹酒沖白糖四五兩灌入不飲酒者水服亦可愈多愈妙無論受傷輕重服之可免瘀血攻心至穩至靈百不可輕忽又如氣絕不省人事者急用生半夏末水調如黃豆大塞鼻孔男左女右立能甦醒即去之鼻痛用老薑汁擦之即止九龍定風針治跌打損傷或手足肩腰瘋痛年久不愈痠痛隱在骨節筋間非膏藥煎劑之力所能到者用此極效生草烏生川烏北細辛鬧陽花各三錢漂蒼朮三錢五分瑤桂心四錢白芷二錢五分艾絨五錢麝香八分上藥各研細末和勻再研極細薑汁煉作條如不好做以白芨研細末滾薑汁攪作糊搗藥搓條每條長寸許如細筆桿粗曬乾儲錫瓶封口勿令泄氣受蒸臨醫時先用竹筷頭點痠痛之處墨圈記之令病人切勿稍動以免墨圈移位再以竹紙春八夏十二秋十冬六層紙放墨圈患上將藥條向燈火燃著一頭用力拄紙上看準隔墨圈患處一次呼吸之間火滅紙面層見焦余層如故少頃針處起疱用鐵針挑破火炮藥搽之無論患穴多少凡竹筷頭點之覺甚痠痛者均宜針之一二旬後患疱兩愈永不復發紫金錠此藥能治百病效驗如神居家出門不可不備一凡中飲食藥毒瘴氣河豚土菌死牛馬等毒並用涼水磨服一錠或吐或痢即愈一癰疽發背疔腫楊梅等一切惡症風疹赤遊痔瘡並用溫水或酒磨日塗數次即消一陰症傷寒狂亂瘟疫喉痹喉風並用冷水入薄荷汁數匙化下一心胃及一切氣痛用淡酒化下一泄瀉痢疾霍亂絞腸痧用薄荷湯化下一中風中氣口緊眼歪五癲五癇鬼邪鬼胎筋攣骨節痛暖酒化下一自縊溺水心頭溫者冷水磨灌下一傳屍癆瘵涼水化服取下惡物蟲積為妙一久近瘧疾將發時東流水煎桃枝湯化服一婦女經閉紅花酒化服一小兒驚風五疳五痢薄荷湯化服慢驚忌用一頭風頭痛酒研貼兩太陽上一諸腹鼓脹麥芽湯化下一風蟲牙痛酒磨塗之亦吞少許一打撲損傷松節煎湯化下一湯泡火傷毒蛇惡犬咬傷冷水磨塗仍服之山慈菇洗淨去皮焙二兩五倍子剖洗焙二兩千金子仁白者佳研紙壓去油一兩紅芽大戟去蘆洗焙一兩五錢麝香三錢上藥各研細末和勻再研極細以端午七夕重陽或天德月德天赦天醫黃道上吉日預先齋戒虔心製備藥末陳設拜禱用糯米濃湯和勻入木臼內杵千下作一錢一錠病輕者服一錠重者連服數錠瀉一二次隨食溫粥即止烏金錠治癰瘡初起火盛紅腫者川五倍剖洗焙燥生肥皂去子弦筋焙燥各二兩乳香沒藥各去油六錢上藥各研細末和勻用真米醋搗爛作錠每重二錢曬極燥儲洋鐵筒用時真米醋磨濃雞毛掃敷患處隨干隨敷日近者可散或已作膿覺痛者宜留出患頭敷四圍亦能收小速愈祛瘋酒治一切瘋痛半身不遂等症大熟地龍眼肉各二兩全當歸潞黨參炙棉耆米仁茯神甘枸花各五錢炒白芍炒冬朮千年健海風藤羌活獨活虎脛骨鑽地風五加皮杜仲忍冬藤川續斷牛膝各三錢淡附片瑤桂心炙桂枝虎頭蕉明天麻川芎炙甘草各二錢廣木香紅花各一錢五分上藥用陳紹酒浸瓷瓶瓷盤作蓋棉紙封口重湯燉至點三炷香時為度隨量溫飲一日兩次其效如神孕婦忌服葵花油專治湯泡火燒每年六七月秋葵花開時買麻油二三斤儲瓷瓶約大半瓶為度每晨盡採秋葵花去心蒂曬晾一二時使水氣稍干浸入麻油瓶內採浸數日花漸滿且生白醭即須日曬收盡水氣並用竹筷不時攪勻旋浸旋曬瓶滿為度瓶口蓋以瓷盤用布包扎安置妥處以備不時救濟取敷患處切忌水洗效驗如神枸橘湯專治子癰腎子作痛而不升上外現紅色者是也此症宜速治遲則潰爛致命慎之慎之枸橘一枚無則小橘子代川楝秦艽赤芍澤瀉防風生甘草陳皮各一錢五分水煎溫服二三劑即愈八珍粉治脾虛久瀉或轉腫脹善能去濕健脾蓮子劈開去心南芡實米仁白扁豆淮山藥雲茯苓各八兩糯米粳米各半升上藥各炒微黃和勻用水磨磨細粉儲洋鐵瓶每餐飯宜少吃俟上下半日腹微飢時取粉一二湯匙加白糖開水沖糊服之早夜各服一次亦可至病全愈為止至穩至靈仙傳午時茶專治傷風頭痛冒暑發痧吐瀉等症茯苓片八兩柴胡六兩澤瀉片枳殼片蘇葉防風扁豆赤小豆各五兩忍冬藤枯黃芩鮮竹茹花粉各四兩藿香生甘草香薷麥冬各三兩雙鉤藤二百一十隻鮮荷葉三十片切碎陳茶葉一百兩均用庫平上藥先將荷葉放大鐵鍋內加水煎汁去渣再將茯苓等十七味一併下鍋煎至汁水較濃濾汁儲缸仍將原藥加水再煎多時濾汁儲缸再加水煎至第三次濾汁去渣連同前汁併入鍋內再煎至約汁小半鍋為度上將茶葉放入隨放隨拌將汁滲干取起攤曬極燥每服二錢分裝紙袋封口儲大洋鐵筒勿令泄氣受蒸以備施送濟人每服一袋清水煎服暖睡出汗重則二劑同煎小兒減半海豬肉專治小兒胎毒疳瘡痘痳回毒散漫蠟梨頭等症用海豬肉數斤不經水洗切薄片以白鹽醃之儲瓷瓶泥封口凡遇可治之症取肉一片擦患處日擦數次數日全愈仙傳驚風丸專治幼孩各項驚風其效如神雌雄蚱蜢各一百隻須至立冬日向稻田內捉取放瓦爿上文火焙乾研細末廣黃五分真琥珀五分頂硃砂三分上藥各研細末和勻再研清水和為丸每丸約重五分臨用時取一丸研細末用鉤藤煎湯調送服下一二丸即愈
