front:
  text: 序古今方書夥矣或文理深奧或議論紛紜合覽諸編則備增其美分觀一集只各盡所長知醫者察脈辨症固應廣為蒐羅不知者卷帙浩繁奚暇尋其條理求其至簡至約平易近人者莫如單方一門然單方難得世人往往秘而不傳余竊恨焉今春余承同安參鎮陳子明都督之聘適山陰周子薌先生亦就邑侯李蘭生司馬之幕共事一本相與盤桓諸叨教益其平時樂善不倦胞與為懷公餘時兼參醫理考究精微一日以所著經驗奇本一書分為兩卷欲登梨棗見示於余余詳觀始末其中施治方藥條條經驗種種靈奇內科則有臨危救活之良方外證又有丸散膏丹之秘訣無一不備無美不臻簡要精詳開卷瞭如指掌向之所恨不傳者今則得從吾願耳得是書者舉凡居家行旅以及僻處窮鄉隨地隨時緩急可持依方施治奏效如神誠救世之慈航衛生之寶筏也爰綴數言以鐫其後光緒二十四年歲次戊戌仲冬之月福建海壇林賢慶拜序
