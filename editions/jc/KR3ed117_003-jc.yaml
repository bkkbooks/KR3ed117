body:
  text: 卷下急救服鴉片毒並治湯火傷凡遇服鴉片毒者急用生南瓜又名金瓜嫩者更好搗露一小茶杯服下立解不必取吐雖如已死只要南瓜露灌入喉中無不立刻起死回生真仙方也如湯泡火燒以南瓜露日敷患處數次效亦神速倘無南瓜而有瓜藤之時即取瓜藤搗露用之亦效但時值冬春南瓜藤亦無者須於秋初時用淨壇一個放南瓜地上取南瓜藤五六支藤尾斬去不用藤頭塞於壇口內藤用小竹竿架起使高於壇其露自然點滴次日再將瓜藤斬去數尺將壇移近藤頭仍塞壇口內如前滴之仍依前法數日藤露滿壇用綿紙洋布數層包裹壇口串繩紮緊壓以厚磚放陰冷地方以備隨時救人無量功德又方用巴豆仁一粒礬紅少許冷飯數粒搗爛搓成一丸如龍眼核大服下即解雖口齒緊閉撬開將丸捺入喉中無不回生急救服砒毒用防風一兩研細末水調灌之如吐再灌無不立解急救服鹽滷毒生豆腐漿冷服二三碗即解至神至妙如一時難得以黃豆攪粉沖冷水去渣服之亦妙又方用白糖五六兩冷水調服亦效急救壓死跌死急扶起盤腳坐地以手提其發將生半夏末吹兩鼻中以生薑汁灌之只要心頭微溫雖死一日亦活再用白糖調開水服之散其瘀血或即撬開口以熱童便灌之立效婦人難產產久不下連服此方二三四帖頭煎不用二煎以力薄也服至產為度產後忌服接服生化湯蜜炙黃耆大熟地各一兩當歸身西黨參醋炙龜板枸杞子各四錢抱木茯神三錢酒炒白芍川芎各二錢水煎熱服產以氣血為主氣足則易於送胎出門血足則易於滑胎落地若忍痛久則傷氣而氣不足下水多則傷血而血不足產何能下此方大補氣血於臨產危急之時無論產婦平日氣質強弱胞衣已破未破急以此方連服頭煎則痛可立減而胎自順下或竟熟睡片時產下如不覺者或因試痛誤認產痛服藥後竟不痛不產貼然無恙者蓋以此藥補益氣血以還其本源自安於無事矣或疑產婦先感外邪補之則恐邪錮不知痛甚且久則腠理齊開邪從表解矣產水送下邪從下解矣到此時候有虛無實一定之理切勿遲疑也試驗已多百無一失生化湯當歸八錢川芎四錢桃仁十粒杵碎薑炭五分炙甘草五分上藥水煎熱服每日服一帖連服四五帖婦人行經腹痛制香附當歸尾各二錢延胡赤芍丹皮川芎各一錢五分生地一錢紅花八分桃仁念五粒杵碎上藥俟臨痛時每日水煎服一帖連服二三帖即愈愈後永遠忌食生冷茶飯水果等物不久成孕試驗多人產後血崩產後血大來須看血色之紅紫視形氣之虛實如血色多紫乃當去之敗血留之反作痛勿以崩論若紅而色鮮乃是驚傷心而不能主血怒傷肝而不能藏血勞傷脾而不能攝血當以崩治先服加參生化湯幾帖則行中有補血自生旺矣至若形脫氣促或汗出不止宜服加參生化以益氣斯陽生則陰長而血乃生旺非棕灰等止血藥可治也如產已滿月外又宜升舉大補湯治之凡年老積弱人患崩均宜服此湯加參生化湯治產後血崩形脫氣促汗多當歸四錢川芎三錢荊芥四分桃仁十粒杵碎高麗參三錢瑤桂五分二帖後去之炙甘草五分大棗二枚如汗出不止加黃耆高麗參各三錢渴加麥冬五味瀉加茯苓蓮子兩手脈伏或右手脈絕生脈散倍高麗參痰加竹瀝薑汁酒一杯咳嗽加杏仁知母桔梗各一錢驚悸加棗仁柏仁各二錢鮮血來多不止加升麻白芷各五分均水煎熱服或久不進食聞藥即吐用獨參二三錢水一杯煎鍋焦末服之引開胃口如無汗脫等症只服生化湯加炒黑荊芥自安世言芎歸活血不可治崩殊誤升舉大補湯治產後日久血崩不止或如雞卵大塊或去血如片宜大補脾胃升提氣血少加鎮墜心火之藥此方並治老少血崩等症高麗參白朮各三錢熟地二錢當歸一錢五分川芎黃耆各一錢白芷荊芥羌活防風陳皮黃連黃柏炒瀉者勿用各四分升麻甘草各五分如渴加麥冬五味瀉加澤瀉蓮子痰加半夏兼白帶者加蒼朮半夏各一錢俱水煎熱服生脈散保肺清心治氣少汗多兼口渴病危脈絕並夏月火旺爍金高麗參五分麥冬八分五味子九粒水煎溫服產後心腹痛產後心痛即胃脘痛以胃脘在心之下因傷寒氣及冷物故作痛用生化湯佐以散寒消食之品無有不安若腹內痛定然血塊未除只服生化湯佐以益母丸鹿角灰治之則瘀消而痛止若風冷乘虛入腹作痛亦宜加味生化湯以內有肉桂吳萸可以濕散之也若真心痛則指甲青黑或手足冷過腕節朝發夕死無藥可治加味生化湯當歸四錢川芎二錢炮姜炙甘草各五分桃仁十粒杵碎痛止去之肉桂八分吳萸七分生薑三片傷米食加神麯麥芽各一錢傷肉食加砂仁七分山楂肉五枚水煎熱服婦人經血過多遍身疼痛此乃血不歸經肝不藏血之故宜用歸芍湯全當歸一兩生白芍五錢水煎溫服日服一帖連服十餘帖下期經水照常則愈或已見效尚未復元再酌服數帖即愈婦人乳核生地澤蘭各四錢王不留行蒲公英大力子各三錢炒白芍小青皮廣鬱金川貝母去心茯苓各二錢桔梗生甘草節各一錢五分百合一個水煎每日飯後服連服三五帖至愈為度又方蒲公英四錢夏布包鹿角枝刨薄片三錢陳紹酒水各一杯煎汁熱服一二三服男子疝氣痛白歸身老生薑各三錢用羊肉煎湯每日煎服一帖連服數帖即愈三四日兩頭瘧此係陰陽兩虧之症大熟地龜板鱉甲各四錢西黨參炒茯苓柴胡各三錢檳榔青皮炙甘草各一錢五分生薑五片紅棗十枚上藥水煎熱服每日服一帖發日早服二三帖即愈接服補藥調養二三旬務使氣血復元並須忌食生冷水果等物永不復發痢疾全當歸生白芍各一兩飛滑石藿香各二錢葛根檳榔生甘草枳殼各一錢萊菔子八分廣木香六分上藥水煎熱服無論紅白痛與不痛日夜瀉數十次每日服一帖漸服漸效輕則二三帖重則五六帖至愈為度忌食生冷瓜果急治絞腸痧一名乾霍亂生白礬末二錢陰陽水一鐘調飲吐出暑氣更刺委中穴及十手指近甲處出血更妙暫忌穀食即米湯嚥下亦死慎之慎之急治木舌此症多生於四五月間少年男女五臟之火齊升其舌忽時腫大者急用生鮮茄數個搗汁半茶杯嚥下即愈緣生茄之性能降五臟之火也如無鮮茄或用茄干煎濃汁嚥下亦效若不速治舌必長大滿口不過一二時辰氣閉即死急治喉痹痹者閉也喉間閉塞重者聲啞本無微恙頃刻而起者是巴豆仁三粒細辛末三文上藥共搗爛搓長條約大半寸放綿紙上卷作條約長一寸居中刀切斷將切斷兩頭塞兩鼻孔內頃刻即愈愈後速將藥條拔出棄之切勿久留慎之慎之又方或用瑤桂心炮姜生甘草各五分共盛碗內取滾水衝入仍將碗放滾水內服藥口許緩緩嚥下亦愈纏喉風喉痹此症胸膈氣急忽然喉嚨腫痛手足厥冷氣閉不通明雄精二錢真鬱金一錢巴豆霜三分上藥各研細末和勻煉為丸如白芥子大每服十二丸滾水送下如口噤喉塞用細筆管納丸入喉中須臾吐痰即活纏喉風並一切喉症蘇梗牛蒡子元參赤芍黃芩花粉射干連翹殼荊芥防風各一錢五分川連生甘草各一錢上藥水煎溫服每日服一帖二三帖即愈惟須早服遲恐不及纏喉風此方活人甚多生白礬細末五分烏雞蛋一枚調勻灌入喉中立效單雙喉蛾用萬年青根二寸洗淨削去皮切薄片搗爛如泥加真米醋一酒杯攪勻含咽數次俟蛾破吐出膿血即愈爛喉此疾日久不愈甚至時延兩三年者燕窠泥五錢鳳凰殼三錢生老薑煨姜各七片福建建寧縣潘吉泰之妻前患此症醫藥罔效延至三年不愈後服一二帖見效接服附子炮姜全愈頭風或因風入眼竅以致目瞳漸黃失明如法治之頭風全愈目亦復明惟失明已久者頭風雖愈目不能明螌蝥俗名斑蝥不拘多少焙乾研細末篩去渣儲瓷瓶用小黃蜆殼二個各放藥末大半殼合兩太陽穴以膏藥蓋之勿使出氣貼一周時揭開起黃疱針挑破出水即愈如病較深貼後見效尚未全愈者隔一二旬後再貼一次必愈若僅痛一邊只貼一邊可也他如胃氣上衝頭痛應照胃氣痛方治之又或陰虛頭痛皆非此藥所宜俱不靈也胃氣痛此症甚者每晨吐清水或連頭痛制香附二錢良薑一錢五分砂仁末八分如病重常吐清水加吳茱萸二錢上藥水煎熱服二三帖即愈永遠忌食生冷瓜果以免復發腦流用老絲瓜筋曬燥瓦上煅炭研末每服一錢臨臥之時熱紹酒送下三五服即愈風火眼疾或紅腫疼痛或起紅翳或上下瞼內起紅皮或眼珠上起白點或小兒疳眼發癢者均治用細紙捻細燈心各一條各浸火油大半條左手熱紙捻右手執燈心先以左手紙捻頭點著火移近病人眼邊即以右手燈心頭向紙捻上點著火速炙近眉額上及太陽處每炙有小聲密炙數十點並炙眼瞠下二十餘點患左炙左患右炙右兩眼並患則並炙之輕則數日即愈不必點服藥眼湯藥重則日點光明散內服涼血散火湯均見卷上定獲速效倘至旬余尚未全愈再近未愈眼邊原炙之處酌炙一次以愈為度並須忌食雞鵝豬羊酒糟筍菇蒜韭生薑胡椒煎炒油炸發氣各物二三個月以免復發小兒慢驚用真艾絨作團如桐子大灸頭頂髮旋穴五壯又灸腎莖根當中直上依本身名指內一中節長處小肚穴五壯如病重者此處當有青筋發現灸其上即愈如頭向後拗者再灸頭後頸窩穴五壯效驗如神已愈多人小兒走馬牙疳紅棗三枚去核紅砒三釐將砒勻入棗內用線紮好以半濕田泥包裹炭火煅候冷敲去泥加冰片一分共研細末拭淨患處擦上應效如神久爛之孔生肌亦速蟲疾此疾面色黃瘦飲食少進不時腹痛甚者口吐清水尖檳榔二兩廣木香一兩共研極細末每服五錢小兒三錢須在月初於病人腹飢之時先用煎炒香味食物令其聞之即以溫開水調服無不神效蟲隨大便而出如病重者再服全愈咳嗽多痰並治吐血當歸身三錢生白芍蜜款冬蜜枇葉各二錢牡丹皮一錢五分炙甘草桔梗各一錢砂仁末六分沖橘紅六分如氣緊加蘇子一錢上藥水煎熱服日服一帖輕者三五帖即愈重者服至全愈為度忌食雞鵝豬羊酒糟筍菇煎炒油炸麵食一切發氣各物並忌生冷水果此症最忌涼補熱藥切勿誤服慎之慎之乾咳無痰此症甚至日久不愈者用紅糖拌稀飯連吃數日即愈愈後宜服滋陰補血之劑以復其元並須忌房事省辛勞保無後患婦人乾血癆後載二方宜參觀之杭白朮龜板各一錢五分鱉血柴胡淮山藥各一錢女貞子一錢二分甘草七分杭玫瑰四朵干藕節三錢水煎熱服三五帖見效至愈為度尚有另方見後孕婦胎墜壓脬孕婦足月之際身弱氣虛胎忽下墜將尿脬口壓閉以致尿不能放時久脹痛難忍急令孕婦橫臥床上頭裡腳外屁股下填以綿褲使下部略高令老嫗用兩手輕推其腹使胎升上再令該嫗剪去右手中指甲探入孕婦陰戶之內人宜旁立輕輕撥開脬口其尿直衝而出宜服補益氣血之藥數帖即愈受暑此症頭額脹冷心胸飽滿或覺頭眩或時發冷飯食減少足軟無力脈象浮虛者是六一散三錢藿香一錢半真青蒿梗子不用土者不靈各二錢五分如胸膈飽滿者宜加川厚朴一錢五分上藥水煎熱開水沖熱服頭額手足出汗即效每一二日服一帖連服數帖全愈傷寒小肚驟然脹痛此症或至腎子升上脹痛更甚用大蔥頭六七個切碎搗爛放大碗內陳紹酒半斤重湯燉滾衝入熱服立刻全愈或病已至數日後者如法沖服二三次亦效傷寒忽然發冷發熱此症小便長口不渴先冷後熱甚至人昏脈象沉細系寒症也淡附片四錢吳茱萸炮姜各二錢當歸白芍各二錢五分水煎熱服出汗即愈傷寒身體不時發抖淡附片桂枝尖生白芍各二錢炙甘草一錢生薑三片紅棗三枚上藥水煎熱服每日服一帖連服二三帖至愈為度小兒傷寒忽然眼翻口吐涎沫手足抽搐生薑紅糖各二錢上藥水煎熱服吐出積痰即愈惟須加穿衣褲使其和暖為要陰火發燒此症日夜發燒人昏燒後即退退時人清口不甚渴渴不多飲甚至眼鼻嘴內津液乾燥當歸身生白芍各三錢上藥水煎熱服每日服一二帖漸服漸效至燒退盡為度接服元麥地黃湯數帖即愈元參麥冬各二錢熟地四錢淮山藥白茯苓各三錢山萸肉牡丹皮澤瀉各一錢五分水煎熱服每日服一帖至愈為止魚口便毒此症生在小肚兩旁初起硬腫未紅未痛之時尚可發散第一靈寶丹一錢生白礬末五分研勻雄豬膽汁調搽每日一換燥則覺痛以米醋雞毛蘸敷數日漸消脫骨疽此症生手足各指或生指頭或生指節指縫初生或白色痛極或如粟米起一黃疱其皮或如煮熟紅棗黑色不退久則潰爛節節脫落延至手足背腐爛黑陷痛不可忍用頂大生甘草研極細末麻油調厚敷之每日一換不可間斷再用金銀花元參各三兩當歸二兩生甘草一兩水煎服每日一帖連服十帖必愈永無後患藥味切不可減少少則不效忌食發物並忌搔擦紅絲疔此症生於手足掌脛等處疔邊有紅絲一條循腕股而上漸上漸寬急用艾絨作團如桐子大灸紅絲盡頭處三壯紅絲退縮如法再灸總以紅絲退盡為度疔瘡用三妙膏如意丹治之可保無虞若不速治紅絲之毒至心至臍即難救矣慎之慎之牙漏此症難於收功依法治之無不速愈斷根不用散丹只要日貼三妙膏方見卷上內服元麥地黃湯方見本卷陰火發燒症治其陰虛心火狂燥腎水不足功能降火益水血痣此症生於兩太陽等處陡起紅點如粟粒者是覺癢手搔破出血如紅絲線不止急用瘦豬肉一厚片貼之即止或用穿山甲尾片炒研細末敷之亦止倘皆不效即用小烙鐵煨煅一灸結痂自止內服元麥地黃湯方見前每日一帖水煎熱服連服十餘貼全愈痔痛下血當歸川芎黃耆神麯槐花地榆各一兩阿膠珠血餘炭荊芥穗炒炭木賊草炒黑各三錢上藥共研細末煉蜜為丸如桐子大每服五十丸食前米湯送下臟毒乾柿二錢燒灰研細末開水送服昔有一人患此症下血數年得此方服一次即愈腸風此症糞後出血其色紫黑者是大龍眼肉一粒包苦參子仁七粒空心開水送下每日一服連服三四日即愈又方統治便血用荸薺煮熟吃之連吃數斤以愈為度黃胖病黑棗一斤煮熟去皮青礬一文研細米醋一文共搗爛煉為丸如桐子大曬燥儲瓷瓶病人強壯者每日服三十丸如瘦弱者每日服二十丸開水送下至愈為止肚痛霍亂吐瀉雄黃生白礬各等分共研細末用晚米飯搗爛煉為丸如綠豆大每服三錢開水送下即愈孕婦忌服又治霍亂時證凡上吐下瀉又有吐而不瀉瀉而不吐亦有吐瀉不出者名為乾霍亂治不得法立死此證無論冬夏斷不可食以粥飯並切戒食姜姜一入口不可救也藿香炒蒼朮柴胡羌活各二錢澤瀉木通各一錢神麯陳茶葉各三錢加生蔥連根三支如口乾加鮮荷葉一塊清水濃煎溫服輕者一服重者再服即愈此方得於四川呂祖宮內石碑刻就治愈多人一切牙痛長紙煤二條須內空者剪去頭一寸以斷處留出寸半余以燈油蘸全將頭先後插入左右耳孔內用火點著紙煤尾燒之俟火將及耳急拔去之再用冷水一滴灌入耳內其效如神各種脹病附補藥二方一曰氣脹因飯後口角動氣而成先由胸腹脹起漸漸延脹四肢飲食少進氣不寬舒二曰水脹因小便短少而成先由兩足背脹起漸至上身胃口漸閉而氣漸促以上二症若不速治皆至於死均用仙果散方見卷上每次嚼少許咽汁吐渣每日嚼二三錢連嚼數日俟脹消盡為度不必忌咸或服五香丸方見卷上每日早晚各服一錢淡薑湯送下漸服漸效數日後日服一錢俟脹退盡為止俱不忌咸接服後開補藥二方三曰臌脹俗名蜘蛛脹此因婦女經閉肚腹漸脹四肢漸細狀若蜘蛛也飲食減少夜不成眠諸藥罔效亦用仙果散每次嚼一二分日嚼二三錢漸嚼漸效總以脹消盡為度自然眠食如常接服後開補藥二方至數月後血氣充足經水自通亦不忌咸四曰脾虛脹因脾虛泄瀉日久不愈轉為脹病治法以祛濕健脾為主宜服八珍粉方見卷上每日早晚及上下半日各取八珍粉一二湯瓢加白糖開水沖糊作點心食之漸服漸效服至全愈為度接服後開補藥二方以復氣血亦不忌咸又有病後之人手足頭面胸腹等處忽然浮腫問其大小便如常胃口尚開夜睡安穩惟覺手足軟弱無力辰刻起床面目腫稍退至午刻前後仍如故此係虛腫非脹病也亦宜服後開補藥二方次第服之其腫即消而精神氣力亦得漸漸復元矣以上各種脹病自調治起務須忌食生冷水果並一切發氣各物四個月保無後患補藥第一方大熟地全當歸白茯苓淮山藥南芡實各三錢潞黨參炒冬朮炒白芍各二錢川芎一錢五分砂仁研末沖六分新會皮六分炙甘草一錢生薑三片紅棗五枚水煎熱服每日一帖連服五帖再服第二方補藥第二方大熟地全當歸各四錢潞黨參炙黃耆白茯苓南芡實淮山藥各三錢炒於朮炒白芍川芎各二錢砂仁研末六分沖新會皮六分炙甘草一錢生薑三片烏棗五枚水煎熱服每日一帖連服十餘帖均復元男婦痞塊宜用六味地黃丸其效如神大熟地一斤淮山藥山萸肉各八兩白茯苓牡丹皮澤瀉各六兩上藥研細末白蜜煉為丸如綠豆大每晨服五錢淡鹽湯送下漸服漸效切勿間斷至愈為度遺精此症系勤勞太過心腎不交所致心火旺則腎水溢腎水溢則下泄矣方以補中土為主土運則生金金旺則生水而制火宜用後開諸方次第服之抱木茯神漂於朮石蓮子各三錢九制何首烏二錢五分女貞子二錢遠志肉柏子仁各一錢炙甘草梢八分上藥水煎熱服每日一帖連服五六帖接服後方大熟地五錢雲茯苓抱木茯神各四錢山萸肉遠志肉各三錢生棗仁一錢五分杭白芍制首烏土炒漂白朮各二錢粉甘草一錢五分建蓮肉三錢正瑤桂心二分水煎服二帖接服後方大熟地六錢雲茯苓抱木茯神薏苡仁各四錢山萸肉生棗仁各三錢杭白芍土炒漂白朮各二錢當歸一錢五分黃連三分瑤桂心二分水煎熱服四帖再服後方大熟地雲茯苓薏苡仁山萸肉生棗仁各三錢抱木茯神土炒漂白朮杭白芍各二錢全當歸北五味各一錢川黃連二分瑤桂心一分五釐水煎服數帖至全愈為度瘰癧生薑一片如一錢厚貼癧上艾絨一團略小於癧捻緊上尖下平放薑片上灸之火息去灰連灸三壯換薑片再灸四壯為度灸處起疱針挑破塗葵花油方見卷上去其火毒數日平復約二三旬後其癧漸消或已日久未能消盡再灸一次必盡消也癲狗咬傷毒發欲死凡被癲狗咬或銜衣即觸毒氣設自昧不覺未經早治或治不中肯急則七日發作緩作則七七日至百日定當發作卒病心腹絞痛如刀割神識不清痛劇無賴自抓胸膺嚼舌齧指咬其膚肉甚至嚼衣服瓷器不過二三時即死欲辨症是否須用葵扇重扇見風即身縮戰慄畏懼又急鳴鑼聞聲亦驚惕不安確是中癲狗毒無疑即驗狗是否病癲亦以葵扇風試風見風戰慄以鑼聲試聞亦亂竄確是癲狗當其觸毒未發一聞鑼聲其癲即發人與狗皆然曾見人中癲狗毒發遇友人用人參敗毒散加生地榆紫竹根濃煎急灌一劑而神識清醒兩劑盡而病若失此係目擊經驗者方見後真紋黨紅柴胡前胡羌活獨活茯苓生甘草各三錢炒枳殼桔梗撫芎各二錢生地榆一兩紫竹根一大握生薑三錢清水濃煎溫服又據友云癲狗來家或遇諸塗不及趨避或被咬銜衣感觸毒氣知覺畏風畏鑼聲或在七日服藥一劑於本人頭頂尋覓紅髮盡行拔去至二七日嚼生黃豆試驗有無留毒如嚼豆有生豆氣噁心欲嘔則已毒盡不必再服若無生豆氣如熟地可口不作惡欲嘔急再服一劑至三七日仍用豆照前嚼試服至三劑留毒已化為膿血從大便出盡永保無虞設好狗被咬於未發之先亦用此方加烏藥一兩水濃煎拌飯與食斷不致癲屢經照方施治應手見效即孕婦亦可服愈並無他患靈驗異常所望仁人君子大發慈悲刊印傳送俾得周知隨遇施救功德無量毒蛇咬用田雞草放口內嚼融敷傷處立能止痛消腫風濕腳腫杉木皮二兩東瓜皮柚子皮各一兩生薑皮蒼朮防風各五錢桑葉桑枝桂枝尖附片花椒各三錢羌活二錢生薑五大片蔥頭五個紹酒腳一斤加清水同煎先熏後洗數次即愈手足風濕麻木作痛生黃耆桑寄生木瓜老生薑各三錢生白芍二錢大紅棗二十枚用米酒燉透代茶漸服漸效不拘幾服至愈為度食積嘔水陽附三錢西莊黃力勝生軍檳榔各一錢細辛二分水煎熱服一二帖取瀉即愈腎子腫痛名曰子癰此症腎囊發紅腎子下墜者是若不速治潰爛致命用活青竹一段長尺余放柴火上四面燒黑淬入清水立刻取起其竹尚溫以色布包裹戤於腎囊兩腿夾緊少頃即愈以上二方系黃震旺君抄傳又方用枸橘湯方見卷上服二三帖即愈手腕彎十指屈身體瘦不起床名曰癱症當歸二兩川芎八錢枸杞子菟絲子各五錢川杜仲巴戟天各三錢鹿茸二錢川牛膝一錢威靈仙五分上藥提出鹿茸研極細末放有蓋茶碗內或放參罐內更好余藥水煎汁衝入重湯燉化取起熱服每日服二帖須服至一二百帖才得漸漸見效服至其病愈半之時每日服一帖大約須服三四五百帖方能全愈復元切勿間斷是為至要建寧縣黃震旺君於而立之年曾患此症醫藥罔效後遇良醫開服前方共服六百多帖病體復元從此學醫濟世近年愈古稀康健無比足徵醫術救人之報面傳此方以廣傳布十指屈伸如樹段不能稍動大便堅閉脈極弱細名木癱症與前症稍異耳白歸身六錢熟地炙黃耆淡蓯蓉各四錢鹿茸末生白芍各二錢川牛膝一錢川芎一錢五分制威靈仙六分東洋參三錢上藥以四物湯為主加參耆鹿茸蓯蓉為補益氣血生津以潤化加威靈仙川牛膝為利機關報使之先鋒應將鹿茸末提出放入參罐或有蓋茶碗內余藥煎汁衝入重湯燉化取起熱服再日服二帖連服六十餘帖手足略能舉動大便得解甚堅燥再服六十帖始能下床舉步又服六七十帖能行走以後日服一帖直服至三百餘十帖精神氣血一切復元倘患病之人景況平常無力吃鹿茸以鹿角膠三錢代之建寧縣醫士朱田薲君於知命之年曾患此症系照前方服至全愈面授此方以廣流傳拔老瘡管先用升降丹將患口爛稍大再用扁柏嫩葉少許搗爛加紅糖少許煉勻取如黃豆大一粒捺入瘡口內膏與蓋之隔一二日管肉自出鉗去另用金花散摻滿瘡口蓋以膏藥每日一換數日後長肉收功一切瘧疾白胡椒粉一錢第一靈寶丹三分研勻儲瓷瓶勿令泄氣不拘何瘧取藥一分放臍上膏藥蓋之二日一換貼二三次即愈奇病乳垂某婦產後兩乳下垂長過小腹形細如牛筋疼痛異常即延新到之王醫者名其年診視用當歸川芎兩味燒煙燻之久則痛止乳亦縮上如舊好在藥味平淡而奏效神速也初生小兒解痘生地當歸赤芍各二錢金銀花荊芥穗紅花桃仁各一錢生甘草五分上藥用水二茶杯煎一茶杯取本小兒臍帶約二三寸炭火焙乾研末調入藥內令小兒數次服完今日服藥明日出痘三日後收功不灌漿亦不結甲再數日即出疹此方須於小兒生下十日之外十八日以內用之若過十八日則不驗矣慢驚風慢驚之症緣小兒吐瀉得之為最多或久瘧久痢或痘後疹後或因風寒飲食積滯過用攻伐傷脾或秉賦本虛或誤服涼藥或因急驚而用藥攻降太甚皆可致此症也其症神昏氣喘或大熱不退眼開驚搐或乍寒乍熱或三陽晦暗或面色淡白青黃或大小便清白或口唇雖開裂出血而口中氣冷或瀉痢冷汗四肢冰冷並至腹中時響喉內痰鳴角弓反張目光昏暗此虛症也亦危症也俗名謂之天吊風虛風慢脾風皆此症也若再用寒涼再行消導或用膽星抱龍以除痰或用天麻全蠍以驅風或用知柏芩連以清火或用大黃巴豆以去積殺人如反掌良可畏也若治風而風無可治治驚而驚亦無可治此實因脾腎虛寒孤陽外越元氣無根陰寒至極風之所由動也治宜先用辛熱再加溫補蓋補土所以敵木治本即所以治標凡小兒一經吐瀉交作即是最危之症若其屢作不已無論痘後疹後病後不拘何因皆當急用參朮以救胃氣不唯傷食當救之即傷寒傷暑亦當救之蓋其先雖有寒暑實邪一經吐瀉業已全除脾胃空虛倉廩匱乏若不急救恐虛痰上湧命在頃刻矣庸醫見之皆誤指為熱為食投以清火去積涼藥立時告變為之奈何於是群起而譁曰慢驚本不治之症也夫慢症而以急症治之不死何待今既以慢驚為不治矣曷不推究此理與其失之寒涼萬難生活不若失之溫補猶可療救此論發明吐瀉驚風之理極為明確亦極易辨別後之君子將臚列各條細加詳察如有數處相合即急救之萬不可再有濡滯致喚奈何也今將慢驚辨症臚列於後一慢驚吐瀉脾胃虛寒也一慢驚身冷陽氣抑遏不出也一慢驚鼻孔煽動真陰失守虛火爍肺也一慢驚面色青黃及白色乃氣血兩虛也一慢驚大小便清白腎與大腸全無火也一慢驚昏睡露睛神氣不足也一慢驚手足抽掣血不行於四肢也一慢驚角弓反張血虛筋急也一慢驚乍熱乍冷陰血虛少陰陽錯亂也一慢驚汗出如洗陽虛而表不固也一慢驚手足瘛瘲血不足以養筋也一慢驚囟門下陷虛至極也一慢驚身雖發熱口唇焦裂出血卻不喜飲涼茶水以及所吐之乳所瀉之物皆不甚消化脾胃無火可知唇之焦黑乃真陰不足也大凡小兒因發熱不退及吐瀉過多總屬陰虛陽越必須預防其成慢驚之症此與感冒風寒發熱迥乎不同故不宜再散治宜培元救本加薑桂以引火歸源必辛熱開寒痰再進溫補萬無一失尤冀仁人君子詳審前開條款速為極救禱切禱切小兒之為病須細察其形色再探問乳之者病因何而起所食何物曾否驚嚇夜間如何情景如此逐一問去再開方用藥庶幾不誤今將經驗二方列後逐寒蕩驚湯此方藥性溫暖專治小兒體弱久病或痘疹後誤服寒涼轉為慢驚認系虛寒速服此藥開痰寬胸止吐回元瑤桂心一錢研細或磨濃汁不可經火炮姜一錢胡椒一錢研丁香十粒研另用灶心土三兩煮水澄極清煎前四藥之末一大酒杯頻頻灌下一二劑嘔吐漸止再接服後方定獲奇效切勿遲疑加味理中地黃湯此方助氣補血治小兒精神虧氣血壞狼狽瘦弱皆可挽回濃煎頻服參天救本之功難以盡述熟地五錢當歸三錢如三四劑後泄瀉未止者去之山萸肉一錢六分枸杞三錢白朮四錢條參二錢炮姜一錢五分棗仁二錢炙甘草一錢五味子一錢瑤桂心一錢破故紙二錢生薑三片紅棗三枚胡桃一個打碎為引仍用灶心土一兩煮水煎藥取濃汁大半茶杯加附子三分煎水攙入量兒大小分數次灌之如有咳嗽加粟殼一錢金櫻子一錢如大熱不退加白芍一錢泄瀉不止加丁香六分只服一劑即去附子只用丁香七粒隔二三日只用附子一二分蓋因附子大熱中病即宜去之如用附子太多恐小便閉塞若不用附子則沉寒臟腑固結不開如不用丁香則泄瀉不止此又神而明之存乎其人者唯在依方療救者臨時斟酌萬全而已此方乃救陰固本之要藥治小兒慢驚稱為神劑若小兒吐瀉不至甚或微見驚搐胃中尚可受藥吃乳便利者並不必服逐寒蕩驚湯只服此藥一劑而風定神清矣如小兒尚未成驚不過昏睡發熱不退或時熱時止或日間安靜夜間發熱以及午後發熱等症總屬陰虛均宜服之若素來壯實之小兒偶染新病眼紅口渴者乃實火之症方可用清解之劑但果系實火必大便閉結氣壯聲宏且喜飲冷茶水若吐瀉交作即非實火可知矣此方補造化陰陽所不足實回生起死有神功倘大虛之後一劑未見大驗審視小兒稍有起色即多服之可奏奇功如其脾胃虛寒胸膈胃口有寒痰拒藥不受者可先權用溫中補脾湯如不應再用此湯溫中補脾湯西黨參炙黃耆於朮各一錢乾薑白蔻砂仁各八分炙甘草茯苓官桂陳皮半夏各六分生薑三片紅棗三枚水煎濃汁一酒杯頻頻灌之必獲應效大麻瘋一名紫雪瘋鎮江丁參將患此症得此秘方治之痊愈又醫多人無不取效如神但患此症者眉毛若盡脫落其症難治如眉毛尚未脫盡雖手足骨節有損塌皆可治凡初起未深之症百試百效先服湯藥四劑每日一劑再服丸藥湯藥方陳皮白芷苦參天麻秦艽川續斷荊芥薏苡仁防風羌活風藤牛膝當歸海桐皮蒼朮連翹殼木香桂枝甘草各一錢黑棗二枚生薑一片水二碗煎至一碗熱服渣再煎服丸藥方大胡麻小胡麻白蒺藜各一斤四兩苦參一斤荊芥防風各八兩當歸蒼朮各六兩牛膝薏苡仁續斷各四兩上藥共研細末水發為丸如綠豆大每丸藥一錢加楓子膏春秋各八釐夏六釐冬一分每服丸三錢或二錢照數加楓子膏捻圓攙和用毛尖茶送服楓子膏大楓子一斤去殼用仁銅鍋內炒至三分紅色七分黑色為度太過則無力不及則傷眼炒後研成細膏如紅沙糖一樣用銅杓盛向火上熬四五滾倒在油紙放泥地上以物罩之候冷儲磁罐待用如上面生黴拭去之照常用百日內切忌房事切忌食鹽犯之不愈並忌醬油醋及一切雞鵝魚肉發氣動風等物小孩日夜咳嗽吐痰兼血此乃痧氣入肝致成連珠嗽痰色白血鮮紅氣或急或緩時熱時寒飯食少進大便似近於痢傅伯揚君開付二方各服二劑善為調養漸漸復元焦山梔山茶花各三錢川貝母冬桑葉馬兜鈴杏仁旋覆花各二錢碧玉散三錢炒枯芩紫菀各一錢五分款冬通草各一錢枇杷葉三片水煎服二帖接服次方山茶花白蛤殼各三錢旋覆花馬兜鈴款冬川貝母紫菀焦梔子各二錢百部炒枯芩白前各一錢五分枇杷葉絲瓜葉各三片水煎服二帖以後調養漸獲全愈婦人乾血癆將本人兩手中指頭頂合攏用艾圓各灸五壯又於頸後頭節二節骨上各灸五壯又於屁股中間泥鰍骨上灸五壯胸中心窩穴灸五壯艾圓俱如紅豆大其效如神又方用山羊血數分陳紹酒燉化熱服一二次即愈爛腳臁瘡爐甘石四錢上冰片一分豬腳骨髓一副上藥先將甘石冰片各研細末和勻再將豬骨髓搗爛以前二味藥末和入搗勻貯磁碗將患處腐膿用弱紙揩拭乾淨以前藥薄薄敷滿每日一換效驗如神忌食發氣各物
